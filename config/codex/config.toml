model = "gpt-5.5"
model_reasoning_effort = "medium"

sandbox_mode = "workspace-write"
approval_policy = "untrusted"

[profiles.default]
status_line = [
    "model-with-reasoning",
    "current-dir",
    "model",
    "git-branch",
    "context-used",
    "five-hour-limit",
    "weekly-limit",
    "used-tokens",
    "total-input-tokens",
    "total-output-tokens",
    "fast-mode",
    "task-progress",
]

[tui.model_availability_nux]
"gpt-5.5" = 4


# NOTE: Plugins
# See: https://developers.openai.com/codex/plugins
[plugins."github@openai-curated"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

# NOTE: MCP
# See: https://developers.openai.com/codex/mcp
[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.playwright]
command = "pnpm"
args = ["dlx", "@playwright/mcp@latest"]

[mcp_servers.chrome_devtools]
command = "pnpm"
args = ["dlx", "chrome-devtools-mcp@latest", "--autoConnect"]

[mcp_servers.openai_developer_docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.cloudflare_docs]
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare_docs.tools.search_cloudflare_documentation]
approval_mode = "approve"

# NOTE: Feature Flags
# See: https://developers.openai.com/codex/config-basic#feature-flags
[features]
# ChatGPT Apps/connectors support
apps = true

# Codex-generated git commits and commit attribution trailers
# 2026-05-16: experimental
codex_git_commit = false

# Lifecycle hooks from `hooks.json` or inline `[hooks]`
# See: https://developers.openai.com/codex/hooks
hooks = true

# Plugin-bundled Hooks
# https://developers.openai.com/codex/hooks#plugin-bundled-hooks
plugin_hooks = false

# Fast mode selection and the `service_tier = "fast"` path
fast_mode = true

# https://developers.openai.com/codex/memories
memories = false

# Enable subagent collaboration tools
multi_agent = true

# Enable personality selection controls
personality = true

# Snapshot your shell environment to speed up repeated commands
shell_snapshot = true

# Enable the default shell tool
shell_tool = true

# Use the unified PTY-backend exec tool
unified_exec = true

# Undo via per-turn git ghost snapshot
undo = true

[projects."/Users/rokuosan/repo/github.com/rokuosan/github-issue-cms"]
trust_level = "trusted"

