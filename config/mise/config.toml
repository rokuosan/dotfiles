[tasks]
hello = "echo hello from mise"

[tools]
"aqua:ariga/atlas" = "1.1.0"
"aqua:helm/helm" = "latest"
"aqua:kubernetes/kubectl" = "v1.34.5"
deno = "2.7.9"
fzf = "latest"
ghq = "latest"
go = "1.26.1"
"go:github.com/k1LoW/git-wt" = "latest"
java = "26.0.0"
"npm:@github/copilot" = "latest"
peco = "latest"

[settings]
experimental = true

[hooks]
# https://mise.jdx.dev/hooks.html#tool-level-postinstall
postinstall = '''
if [ -x "${HOME}/.config/mise/bin/commit-managed-mise-toml.sh" ]; then
  "${HOME}/.config/mise/bin/commit-managed-mise-toml.sh" "${MISE_TOOL_NAME}"
fi
'''
